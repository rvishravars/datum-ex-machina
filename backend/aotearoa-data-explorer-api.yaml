  '/rest/v2/data/{context}/{agencyId}/{resourceId}/{version}/{key}':
    get:
      tags:
        - Data queries
      summary: 01. Get data queries.
      description: "<p>Data queries allow <strong>retrieving statistical data</strong>.</p>\r\n<p>Entire datasets can be retrieved or individual observations, or anything in between, using filters on dimensions (including time), attributes and/or measures.</p>\r\n<p>All data matching a query can be retrieved or only the data that has changed since the last time the same query was performed.</p>\r\n<p>Last but not least, the data retrieved can be packaged in different ways (as time series, cross-sections or as a table), in a variety of formats (JSON, XML, CSV, etc.).</p>"
