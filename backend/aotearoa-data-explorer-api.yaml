openapi: 3.0.1
info:
  title: Aotearoa Data Explorer API
  description: The application programming interface (API) based on the SDMX standard allows a developer to programmatically access the data using simple RESTful URL and HTTP header options for various choices of response formats including JSON.
  version: '1.0'
servers:
  - url: http://apis.stats.govt.nz/ade-api
  - url: https://apis.stats.govt.nz/ade-api
paths:
  '/rest/data/{flowRef}/{key}/{providerRef}':
    get:
      tags:
        - Data queries
      summary: 06. Get data by the key and the provider.
      description: Get data by the key and the provider.
      operationId: get-rest-data-flowref-key-providerref
      parameters:
        - name: flowRef
          in: path
          description: '<p>The dataflow identifier in {agencyId},{dataflowId},{version} format, e.g. ''STATSNZ,AGR_AGR_001,1.0''. A list of all available dataflows can be returned using the GET /{structure}/{agencyId} operation.</p>'
          required: true
          schema:
            pattern: '^([a-zA-Z][a-zA-Z\d_-]*(\.[a-zA-Z][a-zA-Z\d_-]*)*,)?[a-zA-Z\d_@$-]+(,(latest|(\d+(\.\d+)*)))?$'
            type: string
            example: 
        - name: key
          in: path
          description: '<p>Specifies the data points required. The itemIds for the desired data points are listed for each dimension (in the order the dimensions appear in the data structure) separated by a period, e.g., .20.2022. A dimension can be wildcarded by leaving it blank between the periods, e.g., 1.1..1.1. Multiple itemIDs for each dimension can be returned (OR) by using + between the values, e.g., .20.2009+2005 </p>'
          required: true
          schema:
            pattern: '^([\.A-Za-z\d_@$-]+(\+[A-Za-z\d_@$-]+)*)*$'
            type: string
            default: ALL
            example: 
        - name: providerRef
          in: path
          description: '<p>The <strong>provider of the data</strong> to be retrieved, e.g., STATSNZ</p>'
          required: true
          schema:
            pattern: '^(([A-Za-z][A-Za-z\d_-]*)(\.[A-Za-z][A-Za-z\d_-]*)*,)?[A-Za-z\d_@$-]+(\+([A-Za-z][A-Za-z\d_-]*(\.[A-Za-z][A-Za-z\d_-]*)*,)?[A-Za-z\d_@$-]+)*$'
            type: string
            default: ALL
            example: 
        - name: dimensionAtObservation
          in: query
          description: '<p>Indicates <strong>how the data should be packaged</strong>. The options are: <ul><li><code>TIME_PERIOD</code>: A timeseries view</li><li>[The ID of any other dimension]: A cross-sectional view of the data</li><li><code>AllDimensions</code>: A flat view of the data</li></ul></p>'
          schema:
            pattern: '^[A-Za-z][A-Za-z\d_-]*$'
            type: string
            default: TIME_PERIOD
            example: 
        - name: detail
          in: query
          description: '<p>The <strong>amount of information</strong> to be returned. Possible options are:</p><ul><li><code>full</code>: All data and documentation</li><li><code>dataonly</code>: Everything except attributes</li><li><code>serieskeysonly</code>: The series keys. This is useful to return the series that match a certain query, without returning the actual data (e.g. overview page)</li><li><code>nodata</code>: The series, including attributes and annotations, without observations.</li></ul>'
          schema:
            enum:
              - full
              - dataonly
              - serieskeysonly
              - nodata
            type: string
            default: full
            example: 
        - name: includeHistory
          in: query
          description: '<p>Retrieve <strong>previous versions of the data</strong>. When <code>true</code>, the response will contain up to two datasets per dissemination, one containing new or updated values and one containing the deleted data (if any).</p>'
          schema:
            type: boolean
            default: false
            example: 
        - name: accept-encoding
          in: header
          description: '<p>Specifies whether the response should be compressed and how, e.g., <code>identity</code> (the default; indicates that no compression will be performed).</p>'
          schema:
            enum:
              - br
              - compress
              - deflate
              - exi
              - gzip
              - identity
              - pack200-gzip
              - zstd
            type: string
            default: identity
        - name: accept-language
          in: header
          description: '<p>Specifies the preferred language, e.g., EN for English.</p>'
          schema:
            type: string
        - name: if-modified-since
          in: header
          description: '<p> Instructs to return the content matching the query only if it has changed since the supplied timestamp. Format: date-time (as date-time in RFC3339).</p>'
          schema:
            type: string
        - name: user-agent
          in: header
          description: '<p>This parameter is used to identify the application making the request, e.g., MyApp/1.0 (Language=Python/3.13). The standard format of this header is: {application}/{application version} Language={language}/{language version}.</p>'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/rdf+xml: { }
            application/vnd.sdmx.data+json;version=2: { }
            application/vnd.sdmx.data+json;version=2.0: { }
            application/vnd.sdmx.data+json;version=2.0.0: { }
            application/vnd.sdmx.data+json;version=1.0: { }
            application/vnd.sdmx.data+json;version=1.0.0-wd: { }
