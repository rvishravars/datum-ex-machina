  '/rest/{structure}/{agencyId}/{resourceId}/{version}/{itemId}':
    get:
      tags:
        - Structure queries
      summary: '07. Get a structure based on the type, agency id, structure id, version and item id.'
      description: Item queries extend structure queries by allowing to retrieve items in item schemes such as particular codes in a codelist.
      operationId: get-rest-structure-agencyid-resourceid-version-itemid
      parameters:
        - name: structure
          in: path
          description: '<p>The type of structure to return, e.g., codelist.</p>'
          required: true
          schema:
            enum:
              - actualconstraint
              - agencyscheme
              - allowedconstraint
              - categorisation
              - categoryscheme
              - codelist
              - conceptscheme
              - contentconstraint
              - dataflow
              - datastructure
              - hierarchicalcodelist
              - metadatastructure
              - structure
            type: string
            default: dataflow
            example: 
        - name: agencyId
          in: path
          description: '<p>The id of the <strong>maintaining agency</strong>, e.g., STATSNZ</p>'
          required: true
          schema:
            type: string
            default: STATSNZ
        - name: resourceId
          in: path
          description: <p>The id of the artefact to be returned. The keyword 'ALL' can be used to indicate that any artefact of the specified resource type.</p>
          required: true
          schema:
            type: string
        - name: version
          in: path
          description: '<p>The version of the artefact to be returned, e.g., 1.0. Use <code>latest</code> to get the most recent version.</p>'
          required: true
          schema:
            type: string
            default: '1.0'
        - name: itemId
          in: path
          description: '<p>The id of the item to be returned. It is possible to set more than one id, using + as separator (e.g. A+Q+M). The keyword ''ALL'' can be used to return all items of the matching resource.</p>'
          required: true
          schema:
            type: string
        - name: references
          in: query
          description: '<p>Instructs the web service to also return (or not) the artefacts referenced by the primary artefact; for example, the code lists and concepts used by the data structure definition matching the query.</p>'
          schema:
            enum:
              - none
              - parents
              - parentsandsiblings
              - children
              - descendants
              - all
              - datastructure
              - metadatastructure
              - categoryscheme
              - conceptscheme
              - codelist
              - hierarchicalcodelist
              - organisationscheme
              - agencyscheme
              - dataproviderscheme
              - dataconsumerscheme
              - organisationunitscheme
              - dataflow
              - metadataflow
              - reportingtaxonomy
              - provisionagreement
              - structureset
              - process
              - categorisation
              - contentconstraint
              - actualconstraint
              - allowedconstraint
              - attachmentconstraint
              - transformationscheme
              - rulesetscheme
              - userdefinedoperatorscheme
              - customtypescheme
              - namepersonalisationscheme
              - namealiasscheme
            type: string
            default: all
            example: 
        - name: detail
          in: query
          description: '<p>The amount of information to be returned. Possible values are: <ul><li><code>allstubs</code>: All artefacts should be returned as stubs, containing only identification information, as well as the artefacts'' name</li><li><code>referencestubs</code>: Referenced artefacts should be returned as stubs, containing only identification information, as well as the artefacts'''' name</li><li><code>referencepartial</code>: Referenced item schemes should only include items used by the artefact to be returned. For example, a concept scheme would only contain the concepts used in a DSD, and its isPartial flag would be set to <code>true</code></li><li><code>allcompletestubs</code>: All artefacts should be returned as complete stubs, containing identification information, the artefacts'''' name, description, annotations and isFinal information</li><li><code>referencecompletestubs</code>: Referenced artefacts should be returned as complete stubs, containing identification information, the artefacts'''' name, description, annotations and isFinal information</li><li><code>full</code>: All available information for all artefacts should be returned</li></ul></p>'
          schema:
            enum:
              - allstubs
              - referencestubs
              - referencepartial
              - allcompletestubs
              - referencecompletestubs
              - full
            type: string
            default: full
            example: 
        - name: accept-encoding
          in: header
          description: '<p>Specifies whether the response should be compressed and how, e.g., <code>identity</code> (the default; indicates that no compression will be performed).</p>'
          schema:
            enum:
              - br
              - compress
              - deflate
              - exi
              - gzip
              - identity
              - pack200-gzip
              - zstd
            type: string
            default: identity
        - name: accept-language
          in: header
          description: '<p>Specifies the preferred language, e.g., EN for English.</p>'
          schema:
            type: string
        - name: if-modified-since
          in: header
          description: '<p> Instructs to return the content matching the query only if it has changed since the supplied timestamp. Format: date-time (as date-time in RFC3339).</p>'
          schema:
            type: string
        - name: user-agent
          in: header
          description: '<p>This parameter is used to identify the application making the request, e.g., MyApp/1.0 (Language=Python/3.13). The standard format of this header is: {application}/{application version} Language={language}/{language version}.</p>'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/rdf+xml: { }
            application/vnd.sdmx.structure+json;version=1.0: { }
            application/vnd.sdmx.structure+json;version=1.0.0-wd: { }
