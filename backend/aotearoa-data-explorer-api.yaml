          schema:
            type: string
            example: 
        - name: attributes
          in: query
          description: '<p>This parameter specifies the attributes to be returned. Possible options are:</p><ul><li><code>dsd</code> (all the attributes defined in the data structure definition)</li><li><code>msd</code> (all the reference metadata attributes)</li><li><code>dataset</code> (all the attributes attached to the dataset-level)</li><li><code>series</code> (all the attributes attached to the series-level)</li><li><code>obs</code> (all the attributes attached to the observation-level)</li><li><code>all</code> (all attributes)</li><li><code>none</code> (no attributes)</li><li><code>{attribute_id}</code> (the ID of one or more attributes the caller is interested in)</li></ul>'
